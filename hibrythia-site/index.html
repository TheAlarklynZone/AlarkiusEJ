    <!-- Splash screen: dark overlay, fades out after 1.5s so no gray flash -->
    <style>
      html, body { background-color: #100908; margin: 0; padding: 0; }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-color: #100908;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: splashFade 0.5s ease-out 1.2s forwards;
        pointer-events: none;
      }
      #splash-logo {
        font-family: 'Georgia', 'Times New Roman', serif;
        font-size: 1.1rem;
        letter-spacing: 0.3em;
        color: #c9a84c;
        text-transform: uppercase;
        opacity: 0;
        animation: splashTextIn 0.6s ease-out 0.2s forwards;
      }
      @keyframes splashTextIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes splashFade {
        from { opacity: 1; }
        to   { opacity: 0; pointer-events: none; }
      }
    </style>
    <!-- Content protection -->
    <script>
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
      document.addEventListener('copy',        function(e) { e.preventDefault(); });
      document.addEventListener('cut',         function(e) { e.preventDefault(); });
      document.addEventListener('paste',       function(e) { e.preventDefault(); });
    </script>

  <body>
    <!-- Splash overlay — pure HTML/CSS, no React needed, removes itself via animation -->
    <div id="splash" aria-hidden="true">
      <span id="splash-logo">The Hibrythian Saga</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Splash: show on hard refresh, soft refresh, or direct URL — NOT on client-side nav -->
    <script>
      (function() {
        var splash = document.getElementById('splash');
        if (!splash) return;
        // navigation type: 'reload' = soft/hard refresh, 'navigate' = URL bar enter
        // client-side pushState nav has no navigation entry at all (or type='navigate' but
        // React hasn't mounted yet so we check if this is a fresh page load via the timing API)
        var navEntry = performance && performance.getEntriesByType &&
                       performance.getEntriesByType('navigation')[0];
        var navType = navEntry ? navEntry.type : 'navigate';
        // Only show splash on actual page loads (reload or fresh navigate), not SPA transitions
        // SPA transitions won't trigger this script at all since the HTML isn't re-fetched
        if (navType === 'reload' || navType === 'navigate') {
          splash.addEventListener('animationend', function(e) {
            if (e.animationName === 'splashFade') this.remove();
          });
        } else {
          splash.remove();
        }
      })();
    </script>
  </body>
